server:
  http_listen_port: 8080

metrics:
  global:
    scrape_interval: 30s
    external_labels:
      app: fincontrol
      env: production

  configs:
    - name: fincontrol
      scrape_configs:
        - job_name: fincontrol-api
          static_configs:
            - targets: ["${BACKEND_URL}"]
          scheme: https
          metrics_path: /metrics
          tls_config:
            insecure_skip_verify: false

      remote_write:
        - url: "${GRAFANA_REMOTE_WRITE_URL}"
          basic_auth:
            username: "${GRAFANA_USER_ID}"
            password: "${GRAFANA_API_KEY}"